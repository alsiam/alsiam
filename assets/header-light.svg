<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0070F3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00DFD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070F3;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .shimmer-line {
      animation: shimmer 3s ease-in-out infinite;
    }
    .dot {
      animation: pulse 4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.5s; }
    .dot:nth-child(3) { animation-delay: 1s; }
    .dot:nth-child(4) { animation-delay: 1.5s; }
    .dot:nth-child(5) { animation-delay: 2s; }
  </style>

  <!-- Background -->
  <rect width="1200" height="300" fill="#FFFFFF"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="300" stroke="#000000" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#000000" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#000000" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#000000" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#000000" stroke-width="1"/>
  </g>

  <!-- Floating accent dots -->
  <circle class="dot" cx="100" cy="60" r="2" fill="#0070F3" opacity="0.3"/>
  <circle class="dot" cx="300" cy="240" r="1.5" fill="#00DFD8" opacity="0.2"/>
  <circle class="dot" cx="900" cy="80" r="2" fill="#0070F3" opacity="0.3"/>
  <circle class="dot" cx="1050" cy="200" r="1.5" fill="#00DFD8" opacity="0.2"/>
  <circle class="dot" cx="700" cy="250" r="2" fill="#0070F3" opacity="0.2"/>

  <!-- Top accent line with gradient -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Shimmer overlay on top line -->
  <clipPath id="lineClip">
    <rect x="0" y="0" width="1200" height="2"/>
  </clipPath>
  <g clip-path="url(#lineClip)">
    <rect class="shimmer-line" x="0" y="0" width="600" height="2" fill="url(#grad)" opacity="0.6" filter="url(#subtleGlow)"/>
  </g>

  <!-- Triangle logo mark -->
  <g transform="translate(600, 95)">
    <polygon points="0,-28 24,16 -24,16" fill="none" stroke="#171717" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Name -->
  <text x="600" y="160" text-anchor="middle" fill="#171717" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="2">
    AL SIAM
  </text>

  <!-- Tagline -->
  <text x="600" y="195" text-anchor="middle" fill="#666666" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" letter-spacing="4">
    FULL STACK DEVELOPER  ·  OPEN SOURCE  ·  BANGLADESH
  </text>

  <!-- Decorative separator -->
  <line x1="480" y1="220" x2="720" y2="220" stroke="#EAEAEA" stroke-width="0.5"/>
  <circle cx="600" cy="220" r="2" fill="#0070F3" filter="url(#glow)"/>

  <!-- Version tag -->
  <text x="600" y="255" text-anchor="middle" fill="#AAAAAA" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">
    v2026.03 — crafting digital experiences
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="298" width="1200" height="2" fill="url(#grad)" opacity="0.2"/>
</svg>
